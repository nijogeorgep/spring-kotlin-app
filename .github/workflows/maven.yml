# This workflow will build a Java project with Maven and push to Docker Registry
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image (${{ matrix.platform }})
        run: |
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          IMAGE_ID=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            PUBLISH_FLAG="--publish"
          fi
          pack build ${IMAGE_ID}:${{ github.sha }}-${PLATFORM_TAG} \
            --builder paketobuildpacks/builder-jammy-base \
            --buildpack paketo-buildpacks/adoptium \
            --buildpack paketo-buildpacks/java \
            --path target/spring-kotlin-app-0.0.1-SNAPSHOT.jar \
            --platform ${{ matrix.platform }} \
            --env BP_JVM_VERSION=21 \
            --env BP_JVM_TYPE=JRE \
            --env BP_SPRING_AOT_ENABLED=false \
            ${PUBLISH_FLAG}

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE_ID=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker buildx imagetools create \
            --tag ${IMAGE_ID}:${{ github.sha }} \
            --tag ${IMAGE_ID}:latest \
            ${IMAGE_ID}:${{ github.sha }}-linux-amd64 \
            ${IMAGE_ID}:${{ github.sha }}-linux-arm64
