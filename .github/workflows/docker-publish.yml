name: Docker

on:
  push:
    branches: [ "master" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: temurin

      - name: Build with Maven
        run: mvn -B package -DskipTests --file pom.xml

      - name: Set up pack CLI
        uses: buildpacks/github-actions/setup-pack@v5.7.4

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (${{ matrix.platform }})
        run: |
          PLATFORM_TAG=$(echo "${{ matrix.platform }}" | tr '/' '-')
          IMAGE_FULL=${{ env.REGISTRY }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            PUBLISH_FLAG="--publish"
          fi
          pack build ${IMAGE_FULL}:${{ github.sha }}-${PLATFORM_TAG} \
            --builder paketobuildpacks/builder-jammy-base \
            --buildpack paketo-buildpacks/adoptium \
            --buildpack paketo-buildpacks/java \
            --path target/spring-kotlin-app-0.0.1-SNAPSHOT.jar \
            --platform ${{ matrix.platform }} \
            --env BP_JVM_VERSION=21 \
            --env BP_JVM_TYPE=JRE \
            --env BP_SPRING_AOT_ENABLED=false \
            ${PUBLISH_FLAG}

  manifest:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          IMAGE_FULL=${{ env.REGISTRY }}/$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          docker buildx imagetools create \
            --tag ${IMAGE_FULL}:${{ github.sha }} \
            --tag ${IMAGE_FULL}:latest \
            ${IMAGE_FULL}:${{ github.sha }}-linux-amd64 \
            ${IMAGE_FULL}:${{ github.sha }}-linux-arm64
